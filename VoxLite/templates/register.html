<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join VoxLite - Next Gen Voice Cloning</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --accent: #a855f7;
            --dark-bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(30, 41, 59, 1) 0%, var(--dark-bg) 100%);
            animation: pulseBg 10s infinite alternate;
        }

        @keyframes pulseBg {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 1;
            }
        }

        .auth-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        /* Glow effect */
        .auth-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, var(--primary), var(--accent), transparent, transparent);
            border-radius: 32px;
            z-index: -1;
            opacity: 0.3;
        }

        .logo-box {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #fff;
        }

        .logo-text span {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-dim);
            font-size: 15px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .custom-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-box {
            position: relative;
        }

        .input-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 16px;
            transition: 0.3s;
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 16px 16px 48px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .auth-input:focus+i {
            color: var(--primary);
        }

        .toggle-btn {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px;
        }

        /* Strength Meter Overlay */
        .strength-container {
            margin-top: 10px;
            display: flex;
            gap: 4px;
        }

        .strength-dot {
            height: 4px;
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            transition: 0.4s;
        }

        /* Submit Button Styling */
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px -10px var(--primary-glow);
        }

        .auth-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 30px -10px var(--primary-glow);
        }

        .form-footer {
            text-align: center;
            margin-top: 32px;
            font-size: 15px;
            color: var(--text-dim);
        }

        .form-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Flash Message Toast */
        .toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 9999;
        }

        .toast {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            border-left: 4px solid #fff;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: toastIn 0.4s ease-out;
        }

        .toast.error {
            border-color: #ef4444;
        }

        .toast.success {
            border-color: #10b981;
        }

        @keyframes toastIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }

            .logo-text {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="mesh-bg"></div>

    <!-- Notifications -->
    <div class="toast-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="toast {{ category }}">
            <i class="fas {% if category == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %}"></i>
            <span>{{ message }}</span>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-box">
                <a href="/" style="text-decoration: none;">
                    <div class="logo-text"><span>Vox</span>Lite</div>
                </a>
                <div class="tagline">Explore the future of voice cloning.</div>
            </div>

            <form action="/register" method="POST">
                <!-- Name -->
                <div class="form-group">
                    <div class="label-row">
                        <label class="custom-label"><i class="fas fa-user-circle"></i> Full Name</label>
                    </div>
                    <div class="input-box">
                        <input type="text" name="name" class="auth-input" placeholder="Enter your name" required>
                        <i class="far fa-user"></i>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <div class="label-row">
                        <label class="custom-label"><i class="fas fa-envelope"></i> Email Address</label>
                    </div>
                    <div class="input-box">
                        <input type="email" name="email" class="auth-input" placeholder="you@example.com" required>
                        <i class="far fa-envelope"></i>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <div class="label-row">
                        <label class="custom-label"><i class="fas fa-lock"></i> Password</label>
                    </div>
                    <div class="input-box">
                        <input type="password" name="password" id="passInput" class="auth-input"
                            placeholder="Create a password" required>
                        <i class="fas fa-shield-halved"></i>
                        <button type="button" class="toggle-btn" onclick="togglePass('passInput')"><i
                                class="far fa-eye"></i></button>
                    </div>
                    <div class="strength-container">
                        <div class="strength-dot dot-1"></div>
                        <div class="strength-dot dot-2"></div>
                        <div class="strength-dot dot-3"></div>
                        <div class="strength-dot dot-4"></div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <div class="label-row">
                        <label class="custom-label"><i class="fas fa-check-double"></i> Confirm Password</label>
                    </div>
                    <div class="input-box">
                        <input type="password" name="confirm_password" id="confirmInput" class="auth-input"
                            placeholder="Verify password" required>
                        <i class="fas fa-key"></i>
                        <button type="button" class="toggle-btn" onclick="togglePass('confirmInput')"><i
                                class="far fa-eye"></i></button>
                    </div>
                </div>

                <button type="submit" class="auth-btn">
                    <span>Create Account</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="form-footer">
                Already registered? <a href="/login">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const btn = input.nextElementSibling.nextElementSibling;
            const icon = btn.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'far fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'far fa-eye';
            }
        }

        // Strength Logic
        const passInput = document.getElementById('passInput');
        const dots = document.querySelectorAll('.strength-dot');

        passInput.addEventListener('input', () => {
            const val = passInput.value;
            let score = 0;

            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^a-zA-Z0-9]/.test(val)) score++;

            dots.forEach((dot, idx) => {
                dot.style.background = 'rgba(255, 255, 255, 0.1)';
                if (idx < score) {
                    if (score <= 2) dot.style.background = '#ef4444';
                    else if (score === 3) dot.style.background = '#f59e0b';
                    else dot.style.background = '#10b981';
                }
            });
        });

        // Hide toasts
        setTimeout(() => {
            const toasts = document.querySelectorAll('.toast');
            toasts.forEach(t => {
                t.style.transform = 'translateX(120%)';
                t.style.opacity = '0';
                t.style.transition = '0.5s';
            });
        }, 5000);
    </script>
</body>

</html>
